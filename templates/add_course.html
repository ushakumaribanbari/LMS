<!DOCTYPE html>
<html>
<head>
    <title>Add Course</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
            margin: 0;
            padding: 0;
        }

        h2 {
            text-align: center;
            padding: 20px;
            background-color: #2c3e50;
            color: white;
            margin: 0;
        }

        .form-container {
            width: 90%;
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        .btn {
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            margin-top: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>

</head>

<body>

<h2>Add Course</h2>

<div class="form-container">
    <form method="POST">

    <input type="text"
           name="title"
           placeholder="Course Title"
           required>

    <br><br>

    <textarea name="description"
              placeholder="Course Description"
              rows="6"></textarea>

    <br><br>

    <input type="text"
           name="video_url"
           placeholder="YouTube Embed Link (optional)">

    <br><br>

    <button type="submit">
        Add Course
    </button>

</form>

    <div class="back-link">
        <a href="/dashboard">⬅ Back to Dashboard</a>
    </div>
</div>

</body>
</html>
