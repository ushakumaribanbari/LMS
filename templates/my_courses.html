<!DOCTYPE html>
<html>
<head>
    <title>My Courses</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#0f2027;
            color:white;
        }

        h1{
            text-align:center;
            margin-top:30px;
        }

        .container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:25px;
            padding:40px;
        }

        .card{
            width:250px;
            background:#1e293b;
            border-radius:15px;
            padding:15px;
            text-align:center;
        }

        iframe{
            width:100%;
            height:150px;
            border-radius:10px;
        }

        .btn{
            padding:10px 20px;
            border:none;
            border-radius:25px;
            background:#00c6ff;
            color:white;
            cursor:pointer;
        }

        .btn:hover{
            background:#0094cc;
        }
    </style>
</head>

<body>

<h1>📚 My Courses</h1>
<p style="
text-align:center;
color:#94a3b8;
margin-top:-10px;
">
Resume your purchased courses anytime 🚀
</p>

<div class="container">

{% for c in courses %}
<div class="card">

{% if c.video_url %}
<iframe
src="{{ c.video_url }}"
frameborder="0"
allowfullscreen>
</iframe>
{% endif %}

<h2>{{ c.title }}</h2>

<p>{{ c.description }}</p>

<a href="/course/{{ c.id }}">
<button class="btn">
▶ Continue Learning
</button>
</a>

</div>
{% endfor %}

</div>

</body>
</html>
