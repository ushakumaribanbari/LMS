<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 360px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0,150,255,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.5);
            background: transparent;
            color: white;
            outline: none;
            font-size: 14px;
        }

        label {
            position: absolute;
            top: 12px;
            left: 0;
            color: #bbb;
            font-size: 14px;
            pointer-events: none;
            transition: 0.3s;
        }

        input:focus + label,
        input:valid + label {
            top: -10px;
            font-size: 12px;
            color: #00c6ff;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 0 15px #00c6ff;
        }

        button:hover {
            transform: scale(1.08);
            box-shadow: 0 0 25px #00c6ff;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .footer a {
            color: #00c6ff;
            text-decoration: none;
        }

        .logo {
            text-align: center;
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #00c6ff;
        }

    </style>
</head>

<body>

<div class="card">

    <div class="logo">LMS 🚀</div>

    <h2>Create Account</h2>

    <form method="POST" action="/register">
        <div class="input-box">
            <input type="text" name="name" required>
            <label>Full Name</label>
        </div>

        <div class="input-box">
            <input type="email" name="email" required>
            <label>Email Address</label>
        </div>

        <div class="input-box">
            <input type="password" name="password" required>
            <label>Password</label>
        </div>
        <div class="input-box">
    <select name="role" required style="width:100%; padding:10px; background:black; color:white;">
        <option value="">Select Role</option>
        <option value="student">👨‍🎓 Student</option>
        <option value="instructor">👨‍🏫 Instructor</option>
        <option value="admin">🛠️ Admin</option>
    </select>
</div>

        <button type="submit">Register</button>
    </form>

    <div class="footer">
        Already have an account? <a href="#">Login</a>
    </div>

</div>

</body>
</html>
